<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Homes Realty</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>🏡 Dream Homes Realty</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#properties">Properties</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="hero">
    <h2>Find Your Dream Property</h2>
    <p>Buy | Sell | Rent</p>
</section>

<section id="properties">
    <h2>Featured Properties</h2>
   <div class="property-container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Luxury Villa">
        <h3>Luxury Villa</h3>
        <p>₹1.5 Cr - Mumbai</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2" alt="Modern Apartment">
        <h3>Modern Apartment</h3>
        <p>₹80 Lakh - Pune</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72" alt="Commercial Space">
        <h3>Commercial Space</h3>
        <p>₹2 Cr - Bangalore</p>
    </div>

</div>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>© 2026 Dream Homes Realty</p>
</footer>

</body>
</html>
